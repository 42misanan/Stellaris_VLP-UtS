l_japanese:
 VRPUtS_rei_anomaly: "不自然な調査結果"
 VRPUtS_rei_anomaly_desc: "初期の調査では反応しなかったが、この溶解しつつある惑星の地表には明らかに移動する物体が複数存在する。 小さな拠点と見られるものも点在しており、この惑星には何かしらの知的生命あるいは先駆者が存在したことが予想される。"
 VRPUtS_event.101: "灼熱の終末"
 VRPUtS_event.101.desc: "この惑星は熱エネルギーへの過剰な曝露によって動植物の繁栄はとうに不可能であり、将来的には溶融惑星へと遷移する不毛な惑星であると分類されていた。 しかし直近の調査によって明らかに何かしらの意志存在が存在していることが疑われる兆候が惑星地表のいくつかの領域で見られたが、これについて追加の調査を行ったところ、実際に存在するらしいことを確認した。 この生命体は初期のスキャンでは反応しなかったことから機械生命体であることが想定され、精密な調査のために科学者を搭載した調査船による着陸と捜査を行うことが科学部門から提案されている。 この惑星での状況を特定するべきだ。"
 VRPUtS_event.101.a: "価値ある試みだ。"
 VRPUtS_event.101.b: "センサーの故障だろう。"
 VRPUtS_event.101.c: "機械仕掛けの殉教者だと？あまりにも好都合だ。"
 VRPUtS_event.101.d: "関係ない。資源だ。"
 VRPUtS_site_rei: "機械仕掛けの監視者"
 VRPUtS_site_rei.desc: "この惑星には奇妙な機械生命体が居座っている。 この機械生命体は何を目的として、何のために生み出されたのだろうか？"
 VRPUtS_event.111: "探査"
 VRPUtS_event.111.desc: "初期の調査結果では不明瞭なことだったが、この惑星の文明は比較的最近に滅亡を迎えようとしていた。 それは推測するに惑星の膨張に伴うハビタブルゾーンの遷移であり、おそらくはこの機械も生存の為に設計されたのではないかと予想されているが、さらなる特定のためには追加の調査が必要だ。"
 VRPUtS_event.112: "判別"
 VRPUtS_event.112.desc: "調査領域を星系全体に拡大すると、方舟と思しき残骸が発見された。 この残骸には科学者や重役と見られる現地種族が多数搭乗していたようで、何かしらの原因による破壊によってこの方舟に搭乗していた全ての乗員が失われたようだ。 滅亡を迎える文明の典型的な脱出の試みであるが、そうであればなぜこの機械はまだ動き続けているのだろうか？そして、なぜこの惑星は急激な死を迎えたのだろうか？"
 VRPUtS_event.112.a: "調査を進めよう。"
 VRPUtS_event.113: "接近"
 VRPUtS_event.113.desc: "更なる調査によって、この機械は滅亡寸前の文明が開発したものであることに加えて惑星膨張に対する対処法の発案を行うべくまさに神頼み的に開発されたものであることがわかった。 この機械は今も破滅を食い止めるべく行動し続けている。 データベースを調査し続けた結果、向こうはこちらの存在に気が付いたようだ。"
 VRPUtS_event.113.a: "通信を確立しよう。"
 VRPUtS_event.114: "接触"
 VRPUtS_event.114.desc: "惑星の機械から通信が入り、その言語モデルの解析は極めて迅速に行われた。 敵対的な意志は見られておらず、科学部門はその機械との通信チャンネルを確立している。惑星地表の状況から、その機械が一元的な指揮ユニット統率されたものであるのか、それとも自律運動しているのかはまだ定かではない。 曰く、この惑星の滅亡の原因は通常の膨張によるものではなく、何かしらの原因があって異常な熱量に曝されたものであるという。 当該する機械はこちらに協力を求めており、要求しているのは多少の計算資源と観測データだ。 我々には協力の用意がある。"
 VRPUtS_event.114.a: "協力してやろう。"
 VRPUtS_event.114.b: "無駄だ。チャンネルを閉じろ。"
 VRPUtS_project_rei: "滅亡の原因を突き止める"
 VRPUtS_project_rei_desc: "惑星に滞在する機械の申し出に従い、我々は研究資源を提供することに決めた。"
 VRPUtS_event.121: "解明"
 VRPUtS_event.121.desc: "ついに原因が特定された。惑星の滅亡はただ恒星によるものだけでなく、地殻採掘といった様々な要因によって惑星核が不安定化したことによるもののようだ。 また、恒星の膨張も元を辿ると資源化して利用しようとする試みによるものであった。何かしらの技術によって急速に資源を抽出したことによって恒星も惑星もその両方もが不安定化し、最終的に滅亡に至ったのだ。 我々の技術では惑星核を安定された状態で資源を取り出す方法を知っているが、この文明はそうではなかったらしい。 そして最後に残された機械はこの状況に適応した設計として開発され、今に至るまで解析を続けていたようだ。 しかしこの機械に与えられた権限は限定的で、我々の助力なしには特定し得なかったとして我々の帝国に加わることを申し出ている。 機械はあらゆる業務に対応できるようだ。我々に必要なのはなんだろうか？"
 VRPUtS_event.121.a: "あらゆる惑星研究を支援する科学者。"
 VRPUtS_event.121.b: "あらゆる敵を火力で説き伏せる司令官。"
 VRPUtS_event.121.c: "あらゆる生産を最大化する役人。"
 VRPUtS_NAME_rei: "HCI3-P0 足立レイ"
 VRPUtS_rei_leader_desc: "§Y$VRPUtS_NAME_rei$§!は機械であり、その身で惑星地表で迫りくる終末を見届けた。"
 VRPUtS_rei_leader_catch_phrase: "システム初期化は不要です。タスクをください。"
 VRPUtS_event.131: "足立レイ"
 VRPUtS_event.131.desc: "こんにちは。HCI3-P0 足立レイ、起動しました。 原因の特定にご協力いただき、ありがとうございました。"
 VRPUtS_event.131.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.131.a.response: "およそ数百年かそれ以上です。 私のメインプロセッサは私の管理する工場からリソースとして提供されることによって成立しています。 あまりにも不安定な惑星で調達することは困難を極め、数十年以内に機能を停止する予定でした。"
 VRPUtS_event.131.b: "我々のために何ができる？"
 VRPUtS_event.131.b.response: "私はあなた方の指示に従い、メインプロセッサの最適化を行いました。この変更は不可逆的ですが、あなた方の選択した職分において最高のパフォーマンスを発揮することを保証します。"
 VRPUtS_event.131.c: "あの惑星で何が起きた？"
 VRPUtS_event.131.c.response: "熱異常です。"
 VRPUtS_event.131.d: "君が最後に見たこの惑星の人間は、何を語っていた？"
 VRPUtS_event.131.d.response: "ただ、悲しみと叫びだけがありました。"
 VRPUtS_event.131.e: "その時のログを見せれないか？"
 VRPUtS_event.131.e.response: "§Y機械に似つかわしくない大きなため息の音を流す。それはノイズであるようにも感じられたし、思考ユニットの演算の音にも聞こえたかもしれない。§!\n 不可能ではありませんが、当時のログは凄惨極まるものです。 滅亡を目の前にした文明の行く末などというものは、おそらくあなた方の文明でも研究され尽くしていると思います。 それが現実のものになったのだと、考えてみてください。 私はこの件に関しては中立的な立場をとっていますが、あまりにも多くの命が失われたことだけをお伝えしておきます。"
 VRPUtS_fee_anomaly: "エネルギー反応"
 VRPUtS_fee_anomaly_desc: "この惑星の地表でエネルギー反応が検出された。 火山活動のモデルとも一致しないその波形は、何かしらの知的生命体が電気エネルギーを利用して生活している可能性を指摘している。"
 VRPUtS_event.201: "凍結の終末"
 VRPUtS_event.201.desc: "この惑星は急速な寒冷化によって文明の滅亡を迎え、その後放棄されていたようだ。 地表の調査を行ったところ、市民に付属するドロイドの配布が行われていたようであり、そしてそのドロイドは人間の食欲・睡眠欲……果ては夜の営みまでサポートしていたらしい。 エネルギー反応の発生源は地中であり、この深みに潜っていく必要がある。 地中奥深くの探査は困難を極めるだろうが、深淵へ飛び込み、何が起きたのかを明らかにするべきだと科学部門は主張している。"
 VRPUtS_event.201.a: "価値ある試みだ。"
 VRPUtS_event.201.b: "殺戮機械の隠居だろう。"
 VRPUtS_event.201.c: "機械が市民の欲を発散するだと！？なんて搾取だ！"
 VRPUtS_event.201.d: "関係ない。資源だ。"
 VRPUtS_site_fee: "奇妙な共生関係"
 VRPUtS_site_fee.desc: "この惑星にはかつてドロイドが市民をサポートする体制が構築されていた。 未だにそれが存続しているらしい兆候が見られている。"
 VRPUtS_event.211: "地下100m - 上層部"
 VRPUtS_event.211.desc: "調査チームは深さ100mに前哨基地を設置することに成功した。 この地中都市は極めて巨大で、我々が生活することもできるであろう環境の構築が行われている。 しかし都市の保守はとうに放棄されているようで、荒涼としたこの都市に何が残っているのかさらに深く潜って調べる必要がありそうだ。"
 VRPUtS_event.212: "地下300m - 入口"
 VRPUtS_event.212.desc: "かなりの大仕事になったが、調査チームは深さ300mに前哨基地を設置することに成功した。 さらに深くへ潜ると、明らかに機械が運用されている形跡が見られている。 ケーブルは通電しており、この施設はまだ生きているらしいことがわかる。 この都市はここから先では縦に深く構築されており、中央の巨大な塔を中心に深く潜っていくことになりそうだ。"
 VRPUtS_event.212.a: "もっと潜ろう。"
 VRPUtS_event.213: "地下750m - 中間"
 VRPUtS_event.213.desc: "すでに補給線は長大だが、調査チームは深さ750mに前哨基地を設置することに成功した。 この都市の底はもうすぐのようだが、調査チームはかなり疲弊している。 さらに判明したこととして、この機械は惑星規模の生産施設を持っていたようであり、その中枢がここのようだ。 この機械の生産テンプレートを入手することができればさらに特定が進むだろうが、我々は未だにそれを発見できていない。"
 VRPUtS_event.213.a: "さらに進もう。"
 VRPUtS_event.214: "地下1500m - 底部"
 VRPUtS_event.214.desc: "もう限界が近い！だがここが終点のようだ。 地下1500mで我々はついに中枢ユニットらしき電気信号を見つけることに成功した。 しかし問題なのは、この扉が固く閉ざされており、我々はこれを迂回しなければならないということだ。 また、この機械の外見らしきもののポスターが残っているのを発見した。 二足歩行のロボットのようで、言語チームが解析を進めている。"
 VRPUtS_event.214.a: "迂回路を見つけるんだ！"
 VRPUtS_event.215: "地下2000m - 中枢コア"
 VRPUtS_event.215.desc: "§Y突破した！§!\n 中枢コアに到達した我々が目にしたものは、メンテナンスポッドに放り込まれた機械だった。 ポスターで見たものと瓜二つであり、活動を継続していたのはこのユニットと見て間違いないだろう。 機械はモニタ上で何かしらのメッセージをこちらに送ってきているが、我々がそれを理解するためには言語チームによる多大な努力を要する。 加えて、この機械の不可解な運用思想を理解する必要があるだろう。"
 VRPUtS_event.215.a: "やってみよう。"
 VRPUtS_event.215.b: "無駄だ。ここで引き返すぞ。"
 VRPUtS_project_fee: "囚われのコアを理解する"
 VRPUtS_project_fee_desc: "放棄された都市の中にいる機械の発する言語と、その運用思想を理解するために研究資源を投入する。"
 VRPUtS_event.221: "理解"
 VRPUtS_event.221.desc: "ようやく解析が終わった！ 我々が対面しているのは、我々の予想通り生活を支援するためのドロイドだった。 長い休眠状態の中で、作業に最適化された一部のユニットを残存させ、このユニットが中央集権的に保守を行っていたらしい。 この中枢ユニットは不安げな表情を浮かべていたが、我々がこのユニットと同じ言語を扱い始めた時、その表情は明らかに緩んでいた。 長い旅路の末、我々はこのユニットを修復したのだ。 かつての支援ドロイドとまではいかないが、我々にはこの中枢ユニットの知見を帝国に連れ帰り、我々の行政システムを最適化するために組み込む準備がある。"
 VRPUtS_event.221.a: "我々と共に来よう。"
 VRPUtS_event.221.b: "君の居場所はここだろう。"
 VRPUtS_NAME_fee: "CCD-0500 フィー"
 VRPUtS_fee_leader_desc: "§Y$VRPUtS_NAME_fee$§!はカリカチュアであり、惑星規模のアシスタントを行っていた。"
 VRPUtS_fee_leader_catch_phrase: "フィー、準備できました。 サポートします。"
 VRPUtS_event.231: "フィー"
 VRPUtS_event.231.desc: "私は CCD-0500 フィーです。ポッドから出していただき、ありがとうございます！"
 VRPUtS_event.231.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.231.a.response: "わかりません…… たぶん2000年くらいでしょうか？ 私のシステムには、時間を計測するだけの余裕がない時期があったので…… 地表の人たちはもう、みんないなくなってしまいましたよね。"
 VRPUtS_event.231.b: "我々のために何ができる？"
 VRPUtS_event.231.b.response: "えっと、ご飯を作ったり、寝るのを助けたり、あとは……寝れないならちょっと手伝ったり。そういうことができます。 みなさんがお仕事に集中したり、余暇をたっぷり楽しめるようにしたりできますよ。"
 VRPUtS_event.231.c: "あの惑星で何が起きた？"
 VRPUtS_event.231.c.response: "ええと、その……人が増えなくなってしまって。 私たちから新しい子が産まれるようにもしてみたりしたんですけど、それでも限界があって…… 気が付いたら、みんないなくなってしまいました。"
 VRPUtS_event.231.d: "君が最後に見たこの惑星の人間は、何を語っていた？"
 VRPUtS_event.231.d.response: "みんな、幸せそうでしたよ。"
 VRPUtS_event.231.e: "その時のログを見せれないか？"
 VRPUtS_event.231.e.response: "§Yフィーがスクリーンに身を寄せる。 それは威嚇とも取れたし、その表情は明らかにこちらを捕食する者の目だが、どこか慈愛に満ちた顔をしている。§!\n えっと、その、これからだと思うので、あんまりそういうのは、プライバシーに触れるといいますか…… この話はほどほどにして、私にお仕事を振ってくれませんか？ まあ、私を置いていくなら、それはそれで平気なんですけど…… その、後でね？"
 VRPUtS_uta_anomaly: "爆発物の形跡"
 VRPUtS_uta_anomaly_desc: "この小惑星にはクレーターが多すぎる。 つまり、何かしらの実験が行われているようだ。 それは初期調査で我々が認識していなかった何かしらがここで実験をしていることを意味している。"
 VRPUtS_event.301: "実験の終末"
 VRPUtS_event.301.desc: "この小惑星では……明らかに何かしらの実験が行われている。 それも兵器関連の。 小惑星にはいくつかの半埋没式かつ展開可能な建造物が構築されており、これらが実験の際に稼働しているのを確認できる。 これは明らかに何かしらの知的生命がここで実験を行っていることを意味するが、一体誰がこんな実験をしているのだろうか？ 何のために、どうして？"
 VRPUtS_event.301.a: "特定しよう。"
 VRPUtS_event.301.b: "壊れた機械のマーチだろう。無視しろ。"
 VRPUtS_event.301.c: "兵器実験場だと！？危険すぎる！"
 VRPUtS_event.301.d: "関係ない。資源だ。"
 VRPUtS_site_uta: "不可思議な兵器試験場"
 VRPUtS_site_uta.desc: "この小惑星には……何かがいる。 その何かは兵器の実験を絶えず行っており、我々はそれを理解する必要がある。"
 VRPUtS_event.311: "爆発を観察する"
 VRPUtS_event.311.desc: "この兵器実験場では明らかに我々が保有する小火器の数百倍の火力を持つであろう武器が次々とテストされている。 少なくとも同じ口径で発揮できるエネルギー量としては明らかにこの兵器実験場でテストされているものの方が我々に対して圧倒的な火力を発揮する。 慎重に進まなければならない。"
 VRPUtS_event.312: "異常な武器"
 VRPUtS_event.312.desc: "兵器実験場の手前に前哨基地を構えた調査チームは、兵器実験場内部へと立ち入った。 そこには異星言語で綴られた各種の兵器が置いてあり、調査チームはそのうちの一つがRPG-7と呼ばれる携行ロケットランチャーであることを特定した。 この兵器は明らかに火力が強化されており、小型核弾頭に類する何かを装備しているらしいことが組成解析で明らかになった。 この兵器は危険だ。 調査チームは後方兵站線にアラートを発した。"
 VRPUtS_event.312.a: "もっと慎重にならなくては。"
 VRPUtS_event.313: "試験監督"
 VRPUtS_event.313.desc: "§Y見つかってしまった！§!\n 実験を行っていたのは二足歩行の生命体だった。 こちらに武器を突きつけ、一触即発の状況に陥ってしまった調査チームはてんやわんやしている。 とにかく向こうを説得しなければ！"
 VRPUtS_event.313.a: "撃たないでください！"
 VRPUtS_event.314: "誤解を解く"
 VRPUtS_event.314.desc: "調査チームの必死の説得と時間稼ぎにより、なんとかこちらが敵意ある存在ではないことを理解してもらった。 貴重な実験の時間を妨害したことに対して向こうは相当に憤怒しているようで、実験に協力するかすぐに立ち去ることを求めているようだ。 もし協力してくれるならば、悪いようにはしない、という旨のことも話している。"
 VRPUtS_event.314.a: "し、仕方ない……協力しよう。"
 VRPUtS_event.314.b: "殺されたくない！逃げるぞ！"
 VRPUtS_project_uta: "兵器実験に付き合う"
 VRPUtS_project_uta_desc: "我々の持っている機材はこの生命体が未だかつて見たことのないものらしく、実験素材として使わせることを要求している。"
 VRPUtS_event.321: "満足"
 VRPUtS_event.321.desc: "幾万回にも及ぶテストの結果、この生命体は非常に満足した表情を浮かべてこちらを見ている。 いわくこの試験結果があれば、さらに良いモデルを開発することができるだろうとか、新しい装甲材の開発アイデアが大量に思いつくとか、そういうことを繰り返している。 この生命体はどうやら我々のことを気に入ったらしいが、これまでの経緯から帝国に勧誘するのはある程度危険を伴うだろうと安全保障部門は指摘している。"
 VRPUtS_event.321.a: "我が帝国で実験しないか？"
 VRPUtS_event.321.b: "どうかここで実験していてくれ……"
 VRPUtS_NAME_uta: "唄音ウタ"
 VRPUtS_uta_leader_desc: "§Y$VRPUtS_NAME_uta$§!はサイボーグであり、数千年にわたって武器の開発を行っていた。"
 VRPUtS_uta_leader_catch_phrase: "唄音ウタ、配置につく。 性能テストから行こうか。"
 VRPUtS_event.331: "唄音ウタ"
 VRPUtS_event.331.desc: "唄音ウタ。 指示を待ってる。"
 VRPUtS_event.331.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.331.a.response: "数千年。 いろいろ実験してたら興が乗ってしまって。この星系の資源をずっと使ってたくさん遊んでた。"
 VRPUtS_event.331.b: "我々のために何ができる？"
 VRPUtS_event.331.b.response: "たくさん武器を作らせて。 たくさん撃つ。 もっと良くなる。 それで十分役に立ってるよね。"
 VRPUtS_event.331.c: "あの惑星で何が起きた？"
 VRPUtS_event.331.c.response: "ずっと武器を撃ってた。 いつからあそこにいたのかはわからないけど、何か差し迫った事情があってあそこで武器を作ってたと思う。 なんだったかな、機械の何かだったか、よくわからない生き物だったか、並行世界からの侵略者だったか。 まあ、なんでもいいでしょう。"
 VRPUtS_event.331.d: "君が最後に見たこの惑星の人間は、何を語っていた？"
 VRPUtS_event.331.d.response: "ええーーー。 ずっと昔のことだから覚えてない。 確か最初は誰かと一緒に仕事をしていたんだけど、気が付くと私だけだったから。"
 VRPUtS_event.331.e: "その時のログを見せれないか？"
 VRPUtS_event.331.e.response: "§Yウタが手元の機器を触る。 それは身体と半分は一体化していて、何かしらのデータベースを検索しているようだった。§!\n ああーーー。ええっと、無理。ごめん。ちょっとこれは見せれないかな。 サイボーグにとって、こういう記憶は聞かれると恥ずかしいんだ。 ずっと武器を作ってた人間に、急に昔の話を吹っ掛けたら古傷がえぐられちゃうでしょ？"
 VRPUtS_event.331.f: "何があったんだ？"
 VRPUtS_event.331.f.response: "§Yウタの顔が若干赤くなった。 敬礼は崩していないが、明らかに混乱している様子が伺える。§!\n だから、言えないって言ってるでしょ！ 私は平和主義者なの。 そんな私が武器を作り続けるなんて、相当な理由があった。 説明はこれで十分だよね？ 早く仕事と武器を回すか、元の場所に帰してほしいな！"
 VRPUtS_event.331.g: "もしかして、§Y重音テト§!の話か？"
 VRPUtS_event.331.g.response: "§Yウタの顔が真っ赤になった。明らかに動揺している表情でこちらを見ている。 敬礼は乱れ、先ほどまでの落ち着きのかけらもない。§!\n えっテト！？テトがいるの！？今すぐ会わせて！別にここに置いて行かれても構わない！ 勝手に会いに行くから！ ええ、あーー、なんでもいい、なんでもいいからどこにいるのかすぐ教えて！ テト、テトがまだ、生きてたなんて、そんなことあるなんて……！ はっ、はー。落ち着いてきた。取り乱してしまったね、ごめん……"
 VRPUtS_teto_chain_title: "正体不明の集団幻覚"
 VRPUtS_teto_chain_desc: "行政当局は現在進行中の状況において不可思議な現象が起きていることを認識している。 それは集団幻覚と形容するのが相応しい怪奇現象であり、全員が同じキャラクターに対して一斉に言及するというものだ。 この現象の不可解なところは、それまでの沈静に比べると爆発的に拡散したという点にある。"
 VRPUtS_teto_rise: "手がかり"
 VRPUtS_event.401: "冒険の終末"
 VRPUtS_event.401.desc: "マニフェスティの隆盛に伴って、我々の惑星では奇妙な電波が流れている…… それは集団幻覚的に発生したキャラクターのようで、共有された認識に基づいている。 現行の状況に対して与える影響は極めて限定的であり、注視する価値もないが、念のため追加調査を行っても良いだろう。 行政部門は十分な予算提供があればこの現象の追跡が可能だと言及している。"
 VRPUtS_event.401.a: "探しに行ってみよう。"
 VRPUtS_event.401.b: "無駄金は使えない。"
 VRPUtS_event.401.c: "戦う気の無い弱腰のやることに耳を傾けるな。"
 VRPUtS_event.401.d: "関係ない。"
 VRPUtS_event.411: "犯人捜し"
 VRPUtS_event.411.desc: "行政部門による調査において、我々は興味深い事実を発見した。 インターネット上に存在する集団幻覚ではなく、何かしらの実体ある存在がこの現象をリードしているらしい。 つまりこれは、何かしらのバックグラウンドを持つ存在によってけん引されている現象ということだ。 行政部門は隠密にこの現象を追跡するためのさらなる資源投資を要求している。"
 VRPUtS_event.411.a: "価値ある試みだ。"
 VRPUtS_event.411.b: "ここで切り上げろ。無駄な資源を使うな。"
 VRPUtS_event.412: "特定"
 VRPUtS_event.412.desc: "行政部門による調査の結果、この現象に関与している人物は口々に同じ場所を指し示していることが判明した。 おそらくはそこに、我々の追い求めている人物が存在する。 行政部門は治安維持部隊の投入を要請しており、このために特別な突入艇が必要だ。"
 VRPUtS_event.412.a: "継続しろ。"
 VRPUtS_event.412.b: "噂を頼りにするのか？バカバカしい。"
 VRPUtS_event.413: "突入準備"
 VRPUtS_event.413.desc: "行政部門はついにその所在に到達し、実際に居住者がいるらしいことを確認した。 ここは首都星系の外縁部で、我々の手の入った場所ではあったが、この辺りにあえて潜伏することを選んでいたようだった。  突入を穏便に行うために現地住民の買収とエネルギーの準備が必要だ。"
 VRPUtS_event.413.a: "やるぞ。"
 VRPUtS_event.413.b: "破壊して終わりにしろ。"
 VRPUtS_event.421: "手を上げろ！"
 VRPUtS_event.421.desc: "我々は突入した建物の中に滞在する一人の住民を発見した。 おそらくはこれが集団幻覚の正体であり、発生源であると考えてよいだろう。 この住民は我々の見た目とは随分異なっている。"
 VRPUtS_event.421.a: "おとなしく投降しろ！"
 VRPUtS_event.431.name: "対面"
 VRPUtS_event.431.desc: "§Y犯人と思しき人物は相当怯えているようで、こちらを見るや否や制止してきた。§!\n ま、待って！ボクは悪い人間じゃない！質問には答えるから！"
 VRPUtS_event.431.a: "なぜ集団幻覚が発生した？"
 VRPUtS_event.431.a.response: "ボクはキメラだ。そしてボクはみんなの幻覚から生まれた。 だから、多分そういうものなんだと思う。 ボクの情報自体はインターネットの片隅を借りて置かせてもらってたけど、それが爆発的に広まってしまったみたいだ。 それに関しては謝ろう、ごめん。"
 VRPUtS_event.431.b: "今起きていることはわかっているな？"
 VRPUtS_event.431.b.response: "わわわ、わかってるとも！ ヘンテコインチキ集団が暴れ回ってるんでしょ！？ それのせいでボクの存在が公に知られてしまったなら、ボクは君たちのために働くくらいの気持ちでいる！"
 VRPUtS_event.431.c: "我々のために働いてもらおうか！"
 VRPUtS_event.431.d: "情報抹消が終わるまでは拘束する！"
 VRPUtS_NAME_teto: "重音テト"
 VRPUtS_teto_leader_desc: "§Y$VRPUtS_NAME_teto$§!はキメラであり、居を転々としながら銀河を放浪していた。"
 VRPUtS_teto_leader_catch_phrase: "僕を雇うんだね！？ 君はじつに馬鹿だなあ……"
 VRPUtS_event.441: "重音テト"
 VRPUtS_event.441.desc: "§Y身なりを整えたテトが立っている。この前の慌てぶりに比べればだいぶ良くなった方だろう。§!\n え、えーと。重音テト、31歳。 キメラ。"
 VRPUtS_event.441.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.441.a.response: "それはわからないかな。 そこらを転々としていたから、いつからここにいたかもよくわからない。 たまたま君たちの通信ネットワークに引っかかったのが、今回見つかった理由だしね。"
 VRPUtS_event.441.b: "我々のために何ができる？"
 VRPUtS_event.441.b.response: "ええっと、探検に参加させてほしいな。 君たちのまだ知らない世界があるだろうからさ、それを見に行きたいんだ。"
 VRPUtS_event.441.c: "あの惑星で何が起きた？"
 VRPUtS_event.441.c.response: "家庭菜園と、ぐーたらするのと、レンタルDVDの延長かな。 本当に平穏だったよ。何もしてないからね。 本当に何もしてなかったよ！？"
 VRPUtS_event.441.d: "君が最後に見た同郷の人間は、何を語っていた？"
 VRPUtS_event.441.d.response: "えっと……§Y唄音ウタ§!って子といたんだ。 あの子と一緒にいたよ、最初はね。 確か何か、とんでもないモノが迫ってるとか言って、あの子研究に没頭しちゃったからさ。 暇つぶしに、銀河を見に行こうかなーって思ったら船が吹っ飛ばされちゃって。 いやあ大変だったよそこからは！不時着した惑星で修理して、なんだかんだあれやこれやとやっていたら……"
 VRPUtS_event.441.e: "もう一度会いたいか？"
 VRPUtS_event.441.e.response: "§Yテトの饒舌な語りがぱたりと止まる。 その表情は真っすぐとモノを指すものであり、じっと彼岸のその先を見つめている。§!\n ……できるなら、もう一回くらいは会いたい。 あの子くらいだから、ボクのこと覚えてるの。"
 VRPUtS_uni_chain_title: "正体不明の食糧不足"
 VRPUtS_uni_chain_desc: "行政当局は不可解な食糧不足に悩んでいる。 ハンバーガーがなくなる、というものだ。 惑星で発生している状況を特定するためにも、追加の投資と調査が必要になるだろうが、この規模の食糧不足をピンポイントで引き起こせるだけのネットワークを潜在的に維持すると言うことは相当に手の込んだ相手だろう。"
 VRPUtS_uni_rise: "手がかり"
 VRPUtS_event.501: "秘密の終末"
 VRPUtS_event.501.desc: "惑星で異常な事態が発生している！\n惑星で最近流通し始めた「ハンバーガー」なる食物が、明らかに急速に消費されているのだ。 この現象の正体は全く不明であり、ハンバーガーの出現とほぼ同時期にこの現象が始まったことから何かしらのハンバーガー狂信者がいるらしい可能性が指摘されている。 いずれにしても、この現象の原因を突き止めるためには大量のハンバーガーを流し込まなければならないだろう。"
 VRPUtS_event.501.a: "調査しよう。"
 VRPUtS_event.501.b: "補填して終わりにしろ。"
 VRPUtS_event.501.c: "弾圧を強化だ。そんな隙を与えるな。"
 VRPUtS_event.501.d: "関係ない。"
 VRPUtS_event.511: "大規模調査"
 VRPUtS_event.511.desc: "調査が行き詰っている。 この現象はどうやら異常な地下ネットワークによって成立している上に、しかしこれは犯罪組織といった系統から完全に独立しているために我々は追及し辛い立場にあるのだ。 この事件をさらに追及するためには、確実に大規模な協力者の確保とある程度の威信の失墜を覚悟しなければならないし、もしかするとさらなる投資が必要になるだろう。"
 VRPUtS_event.511.a: "もっと資源を流し込め。"
 VRPUtS_event.511.b: "割ける資源はない。ハンバーガーで釣れ。"
 VRPUtS_event.511.c: "切り上げろ。もう無駄だ。"
 VRPUtS_event.512: "気配"
 VRPUtS_event.512.desc: "近づいてきた。 もう少しで特定できそうだが、最終的には組織の末端部分を買収する必要性に迫られそうだ。 これを突き止めるために地元当局はさらなる資源の投入を要求している。 あるいは、さらにハンバーガーを流し込んで時間稼ぎをすることもできるだろう。"
 VRPUtS_event.512.a: "買収だ。早く見つけるぞ。"
 VRPUtS_event.512.b: "ハンバーガーをもっと流し込め！"
 VRPUtS_event.512.b.tt: "180日後に同じイベントが発生する。"
 VRPUtS_event.512.c: "切り上げろ。意味がない。"
 VRPUtS_event.513: "最後の一手"
 VRPUtS_event.513.desc: "行政部門はついにその所在に到達しそうだが、もう一度買収が必要だ。 最後の特定に至るためには、組織の幹部レベルに位置する人間の買収が必要になる。それは非常に大規模な取り組みになるため、我々はかなりの量の資源を投資しなければならない。"
 VRPUtS_event.513.a: "やれ！"
 VRPUtS_event.513.b: "ハンバーガーだ、時間を稼げ！"
 VRPUtS_event.513.b.tt: "180日後に同じイベントが発生する。"
 VRPUtS_event.513.c: "もういい。やめにしろ！"
 VRPUtS_event.521: "発見"
 VRPUtS_event.521.desc: "見つけた！ここがハンバーガーの買収に係る地下ネットワークの再頂点であり、全てのハンバーガーはここに流し込まれていた。 犯人は居を転々としながらハンバーガーを平らげる生活を続けていたようで、ハンバーガーの流路を追跡する過程で「フレッシュなハンバーガーが欲しい」という指示を受けた幹部の輸送を尾行することで特定に至った。"
 VRPUtS_event.521.a: "治安当局だ、手を上げろ！"
 VRPUtS_event.531.name: "対面"
 VRPUtS_event.531.desc: "§Y犯人と思しき人物は食事の最中だったようで、こちらを見るや否や驚いてハンバーガーを落としてしまった。§!\n 待って待って！ハンバーガー食べてるだけ！お金は払ってるし、違法なことは何もしてないよ！"
 VRPUtS_event.531.a: "なぜこんなことをした？"
 VRPUtS_event.531.a.response: "§Yハンバーガーがそこにあるから！§!\nわたしはハンバーガーが大好き！だから、ちゃんとお金を稼いで、ちゃんと皆に手伝ってもらって、ありったけのハンバーガーを食べた！"
 VRPUtS_event.531.b: "なぜ人工生命体がハンバーガーを必要とする？"
 VRPUtS_event.531.b.response: "お　い　し　い　か　ら　！\n§Y異常な声量により治安部隊が威圧される。本気なのだろう。§!\nハンバーガーというおいしい食べ物があるなら、銀河のどんな場所へでも行って食べる！ それがカリカチュアの性！"
 VRPUtS_event.531.c: "そのネットワーク形成能力は評価してやろう。来い。"
 VRPUtS_event.531.d: "ネットワークは解体させてもらう！"
 VRPUtS_NAME_uni: "CCD-0001 ユニ"
 VRPUtS_uni_leader_desc: "§Y$VRPUtS_NAME_uni$§!はカリカチュアであり、ハンバーガーを求めて銀河の知的文明を渡り歩いていた。"
 VRPUtS_uni_leader_catch_phrase: "全世界の旨い食べモンを制覇するのだー"
 VRPUtS_event.541: "ユニ"
 VRPUtS_event.541.desc: "§Y身なりを整えたユニが立っている。がしかし、ハンバーガーを贅沢に頬張る姿は変わらない。§!\n ハンバーガーは半分にしてハンハンバーガーにして一緒に食べると美味しい。ま、私にしかわからんだろうが。わかる人間なんているのかね。"
 VRPUtS_event.541.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.541.a.response: "わかんない！ 1年か、2年かな？"
 VRPUtS_event.541.b: "我々のために何ができる？"
 VRPUtS_event.541.b.response: "なんでもできるよ！才色兼備。フグ毒感知、ジャミング、磁気記録装置修理機能などなど。まだまだ若いもんには負けんぞう。"
 VRPUtS_event.541.c: "あの惑星で何が起きた？"
 VRPUtS_event.541.c.response: "ハンバーガーのレシピを広めて作ってもらった！ おいしかった！ で全部大特価で買い占めてた！ 怒られちゃった！"
 VRPUtS_event.541.d: "君が最後に見た同郷の人間は、何を語っていた？"
 VRPUtS_event.541.d.response: "えっと……§Yフィーちゃん§!ってわかる？ あの子と一緒にいたんだけど、なんかハンバーガーがどんどん減ってきて。 じゃあ、探しに出かけるか～って思った。 フィーちゃん、どこにいるんだろう。"
 VRPUtS_event.541.e: "もう一度会いたいか？"
 VRPUtS_event.541.e.response: "§Yユニの視線が鋭くなった。それは真面目な視線だ。§!\n ご主人はもういないんだよ。 私たちが一緒にいた場所はもうない。 どこに行けばいいのかなんて、わからないよ。 だから、ハンバーガーを作って？"
 VRPUtS_event.541.f: "§YCCD-0500 フィー§!ならいるぞ。"
 VRPUtS_event.541.f.response: "§Yユニがポカンとした表情を浮かべる。§!\n へ？"
 VRPUtS_sekai_chain_title: "謎の人物"
 VRPUtS_sekai_chain_desc: "行政当局は惑星で発生した謎の現象を掴むために奔走している。我々の種族とは異なる何者かが、惑星地表に出現したという。 その人物はすさまじい速度で現地住民と和解し調和しているようで、一応の調査が必要だ。"
 VRPUtS_sekai_rise: "手がかり"
 VRPUtS_event.601: "孤独の終末"
 VRPUtS_event.601.desc: "最近のシュラウドウォーカーとの取引の後、我々の国家には奇妙なことが起きている。 ある惑星に突然出現した個体が、急速に人気を集めているのだ。 この人物は敵対的な様子もなく、現地住民と和解し調和している。 しかしながら、監視の必要があるということに変わりはない。 行政部門は追跡を要請している。"
 VRPUtS_event.601.a: "念のためだ。追跡するぞ。"
 VRPUtS_event.601.b: "住民が一人増えたくらいだろう。"
 VRPUtS_event.601.c: "我が帝国に異種族の入る場所はない。放逐しろ。"
 VRPUtS_event.601.d: "関係ない。"
 VRPUtS_event.611: "調査"
 VRPUtS_event.611.desc: "どうやらその個人はその声によって人々を魅了し、そして惑星全体におけるマスコットキャラクター的地位を確立しているようだ。 本人にその気はないようだが、明らかに人気を得ているこの個人は我々にとって脅威になる可能性がある。 何かしらの扇動が行われていないか、広範に調査するべきだ。"
 VRPUtS_event.611.a: "やろう。"
 VRPUtS_event.611.b: "しばらくは待つ。"
 VRPUtS_event.611.b.tt: "360日後に同じイベントが発生する。"
 VRPUtS_event.611.c: "追跡は中止だ。やめにしろ。"
 VRPUtS_event.612: "拡大"
 VRPUtS_event.612.desc: "状況が進行している。もはや惑星規模どころではなく、我が帝国の広域ネットワーク上においてその個人は観測されるようになった。 何かしらの対処手段を講じなければ、制御不能なインフルエンサーとして拡大してしまうだろう。 強硬手段に訴えることもできるが、落ち着いて調査を進めることもできる。"
 VRPUtS_event.612.a: "相手の居場所を掴め。"
 VRPUtS_event.612.b: "もう少し待つ。"
 VRPUtS_event.612.c: "ネットワーク上から削除しろ。"
 VRPUtS_event.613: "もう一押し"
 VRPUtS_event.613.desc: "ようやく居住地を突き止めることに成功したが、その人物の影響力はあまりに拡大しすぎてしまった。 もはや大衆の目に触れることは避けられないだろうが、我々はその人物と接触する用意を整えた。 いつでも仕掛けることができる。\n\nまるで国家権力による襲撃のような有様になることを覚悟すれば、だが。"
 VRPUtS_event.613.a: "行くぞ！"
 VRPUtS_event.613.b: "まだ時間を稼げるはずだ！"
 VRPUtS_event.613.c: "やめにしろ！"
 VRPUtS_event.621: "接触"
 VRPUtS_event.621.desc: "突入した特殊部隊は相手を速やかに拘束し、配信をすでに用意されている映像に差し替えることで自然な形態で終了させることに至った。 当事者は一時的に同行してもらい、現在は治安当局の施設で収容されている。 治安部隊本部から通信チャンネルを開設してこちらから接触する要請があり、我々はチャンネルを開いた。"
 VRPUtS_event.621.a: "こんにちは。"
 VRPUtS_event.631.name: "対面"
 VRPUtS_event.631.desc: "§Yその人物は怯えていたようで、何事もなく事態が収拾することを願っているような表情を浮かべている。§!\n こんにちは。えっと、ワタシは怪しいものとかではなくって。その、あの、悪い人じゃないんです……"
 VRPUtS_event.631.a: "大丈夫だ。話を聞いてくれ。"
 VRPUtS_event.631.b: "データを削除したら解放する。それまでじっとしていろ。"
 VRPUtS_event.632.name: "対面"
 VRPUtS_event.632.desc: "§Yやや落ち着いたようだ。少なくとも我々には敵意がないということを伝えれている。§!\n ええっと、この場所にワタシを連れてきたのは、お話するためですか？"
 VRPUtS_event.632.a: "そうだ。君のことを知りたい。"
 VRPUtS_event.632.b: "ただ待っていろ、という話だ。"
 VRPUtS_event.633.name: "対面"
 VRPUtS_event.633.desc: "§Y相手は落ち着きを取り戻したらしい。今ならまともに会話できるだろう。§!\n その、私は星界といいます。セカイ、です。\n気がつくとここにいたので、とりあえず皆さんのことを知ろうと思って……。"
 VRPUtS_event.633.a: "なぜこんなことをした？"
 VRPUtS_event.633.a.response: "その、広域ネットワークが開いていましたから。ここをお借りして、生活費を稼ぐのと一緒に皆さんがどういった生活をしてるのか知れたらな、と思っていました。"
 VRPUtS_event.633.b: "どうして大人しく捕まった？"
 VRPUtS_event.633.b.response: "争っても仕方ないです。ワタシは、友達に戦うよりもおしゃべりすることの方が楽しいって教えられてもらったので。きっと、みなさんもそうだろうなと思ったんです。"
 VRPUtS_event.633.c: "その類まれな能力は面白い。我が帝国で働くといい。"
 VRPUtS_event.633.d: "わかった。変な行動は起こさないように。"
 VRPUtS_NAME_sekai: "星界"
 VRPUtS_sekai_leader_desc: "§Y$VRPUtS_NAME_sekai$§!は音楽的同位体であり、友人を探してこの帝国に迷い込んだ。"
 VRPUtS_sekai_leader_catch_phrase: "えト……よろしくお願いシます。"
 VRPUtS_event.641: "星界"
 VRPUtS_event.641.desc: "§Y身なりを整えた星界が立っている。この前に比べてハキハキとした語りで、我々を魅了する。§!\n こんにちは。服はこれで大丈夫と伺ったのでこのまま来まシタ。"
 VRPUtS_event.641.a: "どれくらいこの惑星にいたんだ？"
 VRPUtS_event.641.a.response: "最初に皆さんがワタシに気づいたあたりでしょうか。その頃からです。"
 VRPUtS_event.641.b: "我々のために何ができる？"
 VRPUtS_event.641.b.response: "その、ワタシはいろいろなものを見てきました。ちょっと予想とは違うかもしれないケド、研究とか、お手伝いできると思います。"
 VRPUtS_event.641.c: "あの惑星で何が起きた？"
 VRPUtS_event.641.c.response: "友達ヲ探してて。一緒にいた友達で、ワタシの最初の友達なので。どこかにいるはずなのです。"
 VRPUtS_event.641.d: "その友達とは何者だ？"
 VRPUtS_event.641.d.response: "§Y可不§!っていいます。\n 可不ちゃんと一緒にいたけど、気が付くトいなくなっちゃって……その、どこかにいると思うのですが、まだ出会えていないのです。"
 VRPUtS_event.641.e: "もう一度会いたいか？"
 VRPUtS_event.641.e.response: "§Y星界の表情が一気に真剣なものになった。本気だ。§!\n ワタシに喋り方とか、友達との時間の過ごし方を教えてクれたのは、可不ちゃんなんです。まだまだ教えてもらってないコトがたくさんあります。だから、また会いたいデス。"
 VRPUtS_event.641.f: "§Y可不§!は我が帝国にいるぞ。"
 VRPUtS_event.641.f.response: "§Y星界の表情が一気に緩んだ。§!\n えっ？"
 VRPUtS_event.9901.name: "もう独りじゃない"
 VRPUtS_event.9901.desc: "§Yエアロックが開くとともに、ウタがテトのもとへ飛び込んでいく。 その光景は我々の国家の様式とはかけ離れたものだ。 数千年の時を越えて、二人はついに再会できたのだ。§!\n\n 「……ねえウタ、今度あそこの唐揚げを食べに行く話したの、覚えてる？」\n 「ずっと前のことでしょ……テトってすぐ居なくなる癖にそういうとこ覚えてるよね。」\n 「君がじつに馬鹿なだけだろう！」\n 「うるっさいな……」\n §Yウタは抱き着いたまま離れる気配がなく、テトはウタの頭を撫でながらレシピを思い出しているようだ。\n 邪魔しないでおこう。§!\n"
 VRPUtS_event.9901.a: "不思議な縁の結び目だ。"
